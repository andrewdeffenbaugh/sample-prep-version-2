<!DOCTYPE html>
<html>
<head>
<title>Sample Preparation Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6fa;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: 30px auto;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

.plan {
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
  background: #f9fafc;
  border: 1px solid #eee;
}

.tissue {
  display: grid;
  grid-template-columns: 1fr 100px 100px;
  gap: 10px;
  margin-top: 8px;
}

input {
  padding: 6px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

button {
  margin-top: 10px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
