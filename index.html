<!DOCTYPE html>
<html>
<head>
<title>Sample Preparation Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fa;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: 30px auto;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

/* KPI cards */
.kpis {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin: 20px 0;
}

.kpi {
  background: #f9fafc;
  border: 1px solid #eee;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
}

.kpi-value {
  font-size: 28px;
  font-weight: bold;
}

.progressBar {
