<!DOCTYPE html>
<html>
<head>
<title>Sample Preparation Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fa;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: 40px auto;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
}

/* toolbar */
.toolbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

/* kpis */
.kpis {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}
