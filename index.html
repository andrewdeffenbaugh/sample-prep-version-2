<!DOCTYPE html>
<html>
<head>
<title>Sample Preparation Tracker</title>

<style>
body { font-family: Arial; background:#f5f7fb; margin:0; }
.container { max-width:900px; margin:40px auto; }
.card {
  background:white;
  border-radius:15px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.kpis {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.kpi {
  background:#f9fafc;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.kpi-value {
  font-size:24px;
  font-weight:bold;
}

.progressBar {
  margin-top:15px;
  background:#ddd;
  height:10px;
  border-radius:10px;
}

.fill {
  height:100%;
  background:#22c55e;
}

.tissue {
  display:grid;
  grid-template-columns:1fr 80px 80px;
  gap:10px;
  margin-top:6px;
}

button { padding:6px 10px; margin-top:8px; }
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Sample Preparation Tracker</h2>

<div id="controls"></div>

<select id="planSelect" onchange="changePlan()"></select>

<div class="kpis">
  <div class="kpi">
    <div>Total</div>
    <div class="kpi-value" id="total"></div>
  </div>
  <div class="kpi">
    <div>Prepared</div>
    <div class="kpi-value" id="prepared"></div>
  </div>
  <div class="kpi">
    <div>%</div>
    <div class="kpi-value" id="percent"></div>
  </div>
</div>

<div class="progressBar">
  <div id="progress" class="fill"></div>
</div>

<h3>Tissues</h3>
<div id="tissues"></div>

<button onclick="saveToGitHub()">Save (Update Shared Data)</button>

</div>
</div>

<script>

const DATA_URL = "data.json"; // GitHub file

let plans = [];
let currentIndex = 0;

// ✅ load shared data
async function loadData() {
  const res = await fetch(DATA_URL);
  const data = await res.json();

  const grouped = {};

  data.forEach(r => {
    if (!grouped[r.plan]) grouped[r.plan] = [];
    grouped[r.plan].push({
      type:r.tissue,
      total:r.total,
      prepared:r.prepared
    });
  });

  plans = Object.keys(grouped).map(p => ({
    id:p,
    tissues:grouped[p]
  }));

  render();
}

// ✅ add plan
function addPlan() {
  const id = document.getElementById("planInput").value;
  if (!id) return;

  plans.push({ id, tissues:[] });
  render();
}

// ✅ add tissue
function addTissue() {
  plans[currentIndex].tissues.push({
    type:"",
    total:0,
    prepared:0
  });
  render();
}

// ✅ update values
function update(i, field, val) {
  let t = plans[currentIndex].tissues[i];
  t[field] = field==="type" ? val : parseInt(val)||0;
}

// ✅ change plan
function changePlan() {
  currentIndex = document.getElementById("planSelect").value;
  render();
}

// ✅ render UI
function render() {

  document.getElementById("controls").innerHTML = `
    <input id="planInput" placeholder="New Plan">
    <button onclick="addPlan()">Add Plan</button>
    <button onclick="addTissue()">Add Tissue</button>
  `;

  let select = document.getElementById("planSelect");
  select.innerHTML = "";

  plans.forEach((p,i)=>{
    let opt = document.createElement("option");
    opt.value = i;
    opt.textContent = p.id;
    select.appendChild(opt);
  });

  if (!plans.length) return;

  select.value = currentIndex;

  let plan = plans[currentIndex];

  let total = 0;
  let prepared = 0;

  let tDiv = document.getElementById("tissues");
  tDiv.innerHTML = "";

  plan.tissues.forEach((t,i)=>{
    total += t.total;
    prepared += t.prepared;

    tDiv.innerHTML += `
      <div class="tissue">
        <input value="${t.type}" onchange="update(${i},'type',this.value)">
        <input type="number" value="${t.total}" onchange="update(${i},'total',this.value)">
        <input type="number" value="${t.prepared}" onchange="update(${i},'prepared',this.value)">
      </div>
    `;
  });

  let percent = total ? Math.round(prepared/total*100) : 0;

  document.getElementById("total").innerText = total;
  document.getElementById("prepared").innerText = prepared;
  document.getElementById("percent").innerText = percent + "%";

  document.getElementById("progress").style.width = percent + "%";
}

// ✅ convert app data → flat JSON
function toFlatJSON() {
  let rows = [];

  plans.forEach(p=>{
    p.tissues.forEach(t=>{
      rows.push({
        plan:p.id,
        tissue:t.type,
        total:t.total,
        prepared:t.prepared
      });
    });
  });

  return rows;
}

// ✅ save (manual for now)
function saveToGitHub() {
  alert("Copy JSON from console and paste into data.json in GitHub");

  console.log(JSON.stringify(toFlatJSON(), null, 2));
}

loadData();

</script>
</body>
</html>
