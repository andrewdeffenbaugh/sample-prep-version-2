<!DOCTYPE html>
<html>
<head>
<title>Sample Preparation Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: 40px auto;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* KPI Cards */
.kpis {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.kpi {
  background: #f9fafc;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.kpi-value {
  font-size: 26px;
  font-weight: bold;
}

/* Progress */
.progressBar {
  margin-top: 15px;
  background: #e5e7eb;
  height: 12px;
  border-radius: 8px;
  overflow: hidden;
}

.fill {
  height: 100%;
}

/* Tissue rows */
.tissue {
  display: grid;
  grid-template-columns: 1fr 80px 80px;
  gap: 10px;
  margin-top: 8px;
}

/* Colors */
.green { background:#22c55e }
.yellow { background:#facc15 }
.red { background:#ef4444 }

input, select {
  padding: 5px;
}

button {
  padding: 6px 10px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background:#1d4ed8;
}

.mode {
  text-align:center;
  font-size:12px;
  color:#666;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Sample Preparation Tracker</h1>

<div id="mode"></div>
<div id="controls"></div>

<select id="planSelect"></select>

<div class="kpis">
  <div class="kpi">
    <div>Total Samples</div>
    <div class="kpi-value" id="total">0</div>
  </div>

  <div class="kpi">
    <div>Prepared</div>
    <div class="kpi-value" id="prepared">0</div>
  </div>

  <div class="kpi">
    <div>Completion</div>
    <div class="kpi-value" id="percent">0%</div>
  </div>
</div>

<div class="progressBar">
  <div id="progress" class="fill"></div>
</div>

<h3>Tissue Breakdown</h3>
<div id="tissues"></div>

</div>
</div>

<script>

// mode detection
const READ_ONLY = window.location.search.includes("view=readonly");

let plans = JSON.parse(localStorage.getItem("trackerData") || "[]");
let currentIndex = 0;

function save() {
  localStorage.setItem("trackerData", JSON.stringify(plans));
}

// add plan
function addPlan() {
  let id = document.getElementById("planInput").value;
  if (!id) return;

  plans.push({ id, tissues: [] });
  currentIndex = plans.length - 1;

  document.getElementById("planInput").value = "";

  save();
  render();
}

// add tissue
function addTissue() {
  if (!plans[currentIndex]) return;

  plans[currentIndex].tissues.push({
    type:"",
    total:0,
    prepared:0
  });

  save();
  render();
}

// update values
function update(i, field, val) {
  let t = plans[currentIndex].tissues[i];

  if (field === "type") t.type = val;
  else t[field] = parseInt(val) || 0;

  save();
}

// switch plan
function changePlan() {
  currentIndex = parseInt(document.getElementById("planSelect").value);
  render();
}

// render UI
function render() {

  document.getElementById("mode").innerHTML =
    `<div class="mode">${READ_ONLY ? "VIEW MODE" : "EDIT MODE"}</div>`;

  // controls
  document.getElementById("controls").innerHTML =
    READ_ONLY ? "" : `
      <input id="planInput" placeholder="New Plan">
      <button onclick="addPlan()">Add</button>
      <button onclick="addTissue()">Add Tissue</button>
    `;

  let select = document.getElementById("planSelect");
  select.innerHTML = "";

  plans.forEach((p,i) => {
    let opt = document.createElement("option");
    opt.value = i;
    opt.textContent = p.id;
    select.appendChild(opt);
  });

  if (!plans.length) return;

  select.value = currentIndex;

  let plan = plans[currentIndex];

  let total = 0;
  let prepared = 0;

  let tissueDiv = document.getElementById("tissues");
  tissueDiv.innerHTML = "";

  plan.tissues.forEach((t,i) => {

    total += t.total;
    prepared += t.prepared;

    tissueDiv.innerHTML += READ_ONLY
      ? `<div>${t.type}: ${t.prepared}/${t.total}</div>`
      : `
        <div class="tissue">
          <input value="${t.type}" onchange="update(${i},'type',this.value)">
          <input type="number" value="${t.total}" onchange="update(${i},'total',this.value)">
          <input type="number" value="${t.prepared}" onchange="update(${i},'prepared',this.value)">
        </div>
      `;
  });

  let percent = total ? Math.round((prepared/total)*100) : 0;

  document.getElementById("total").innerText = total;
  document.getElementById("prepared").innerText = prepared;
  document.getElementById("percent").innerText = percent + "%";

  let color = "green";
  if (percent < 50) color = "red";
  else if (percent < 80) color = "yellow";

  let bar = document.getElementById("progress");

  bar.style.width = percent + "%";
  bar.className = "fill " + color;
}

// init
render();

</script>
</body>
</html>
